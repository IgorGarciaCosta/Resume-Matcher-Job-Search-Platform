  <rect x="7" y="2" width="23" height="34" rx="2" fill="#a855f7"/>
  <!-- Document lines -->
  <rect x="12" y="9" width="14" height="2" rx="1" fill="#ede6ff"/>
  <rect x="12" y="14" width="14" height="2" rx="1" fill="#ede6ff"/>
  <rect x="12" y="19" width="10" height="2" rx="1" fill="#ede6ff"/>
  <rect x="12" y="24" width="12" height="2" rx="1" fill="#ede6ff"/>
  <!-- Magnifying glass circle -->
